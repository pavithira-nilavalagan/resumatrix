<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder | ResuMatrix</title>
  <link rel="icon" type="image/png" href="image/resumatrix.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
<style>
 @media print {

      /* 1. Set the page specification to exact A4 size and clear browser margins */
      @page {
        size: A4 portrait;
        margin: 0;
      }

      /* 2. Hide everything on the base viewport */
      body {
        background: white;
        margin: 0;
        padding: 0;
      }

      body * {
        visibility: hidden;
      }

      /* 3. Re-enable visibility exclusively for the target container and its content */
      #resume-preview-container,
      #resume-preview-container * {
        visibility: visible;
      }

      /* 4. Lock down the dimensions to exactly match standard portrait scaling like image_53e787.png */
      #resume-preview-container {
        position: absolute;
        left: 0;
        top: 0;
        width: 210mm;
        /* Correct exact A4 width */
        min-height: 297mm;
        /* Correct exact A4 height */
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background: white;
        box-shadow: none !important;
        border: none !important;

        /* Forces browsers to render backgrounds, colors, and accents accurately */
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* 5. Prevent elements from splitting mid-line across multi-page breaks */
      section,
      li,
      div {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* 6. Fully strip out interactive UI panels, action triggers, and buttons */
      .action-buttons,
      button,
      nav,
      footer {
        display: none !important;
        visibility: hidden !important;
      }
    }
    
</style>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800">

  

  <div class="max-w-7xl mx-auto px-4 py-6">
    <a href="dashboard.html" class="inline-flex gap-2 items-center text-slate-500 hover:text-slate-700 transition-all">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
    </a>
  </div>

  <div class="max-w-7xl mx-auto px-4 pb-8">
    <div class="grid lg:grid-cols-12 gap-8">

      <div class="relative lg:col-span-5 rounded-lg overflow-hidden">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 pt-4 relative">

          <div class="absolute top-0 left-0 right-0 h-1 bg-gray-200">
            <div id="progress-bar"
              class="h-full bg-gradient-to-r from-green-500 to-green-600 transition-all duration-300"
              style="width: 0%;"></div>
          </div>

          <div class="flex justify-between items-center mb-6 border-b border-gray-300 pb-3 mt-2">
            <div class="flex items-center gap-4">
              <select id="template-selector" class="border border-gray-300 rounded p-1 text-sm bg-white cursor-pointer">
                <option value="classic">Classic</option>

                <option value="minimal">Minimal</option>
                <option value="compact">Compact</option>
                <option value="overleaf_modern">Overleaf</option>

                <option value="modern_developer">Modern</option>
                <option value="pro_resume">Pro</option>

              </select>
              <input type="color" id="accent-color-picker" value="#3B82F6"
                class="w-8 h-8 rounded border-0 cursor-pointer">
            </div>

            <div class="flex items-center gap-0">
              <button id="btn-prev"
                class="flex items-center gap-1 p-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all hidden">
                <i data-lucide="chevron-left" class="w-2 h-2"></i> Previous
              </button>
              <button id="btn-next"
                class="flex items-center gap-1 p-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all">
                Next <i data-lucide="chevron-right" class="w-2 h-2"></i>
              </button>
            </div>
          </div>

          <h2 id="current-section-title" class="text-xl font-bold mb-4 text-gray-700 flex items-center gap-2">
          </h2>

          <form id="builder-form" class="space-y-4 min-h-[320px]">
          </form>

          <div class="mt-6 pt-4 border-t border-gray-100 flex items-center justify-between">
            <button id="btn-save"
              class="bg-gradient-to-br from-green-500 to-green-600 text-white font-medium shadow hover:opacity-90 transition-all rounded-md px-6 py-2 text-sm cursor-pointer">
              Save Changes
            </button>
            <span id="save-status" class="text-xs text-gray-400 italic"></span>
          </div>

        </div>
      </div>

      <div class="lg:col-span-7 max-lg:mt-6">
        <div id="resume-preview-container"
          class="bg-white p-8 shadow-md rounded-lg border border-gray-200 min-h-[700px] relative flex flex-col justify-between">

          <div id="previewLayout">
          </div>

          <div class="action-buttons mt-8 flex items-center justify-end gap-2">
            <button id="btn-share"
              class="flex items-center p-2 px-4 gap-2 text-xs bg-gradient-to-br from-blue-100 to-blue-200 text-blue-600 rounded-lg font-medium hover:scale-105 transition-all hidden cursor-pointer">
              <i data-lucide="share-2" class="w-4 h-4"></i> Share
            </button>
            <button id="btn-visibility"
              class="flex items-center p-2 px-4 gap-2 text-xs bg-gradient-to-br from-purple-100 to-purple-200 text-purple-600 rounded-lg font-medium hover:scale-105 transition-all cursor-pointer">
              <i id="visibility-icon" data-lucide="eye-off" class="w-4 h-4"></i> <span
                id="visibility-text">Private</span>
            </button>
            <button id="btn-download"
              class="flex items-center py-2 px-6 gap-2 text-xs bg-gradient-to-br from-green-100 to-green-200 text-green-600 rounded-lg font-medium hover:scale-105 transition-all cursor-pointer">
              <i data-lucide="download" class="w-4 h-4"></i> Download
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>

  

  <script>

        // =====================================================
    // SERVER CONFIGURATION - UPDATED FOR RENDER
    // =====================================================
    // Detect if running locally or on production
    const isLocal = window.location.hostname === 'localhost' || 
                    window.location.hostname === '127.0.0.1' ||
                    window.location.hostname === '';

    // Use Render URL in production, localhost in development
    const SERVER_URL = isLocal 
        ? 'http://localhost:3000' 
        : 'https://resumatriix-backend.onrender.com';

    console.log(`🚀 Environment: ${isLocal ? 'Development' : 'Production'}`);
    console.log(`🌐 Server URL: ${SERVER_URL}`);
    // --- Initial Constants & Application State Structure ---
    // --- Initial Constants & Application State Structure ---
    const SECTIONS = [
      { id: "personal", name: "Personal Info", icon: "user" },
      { id: "summary", name: "Professional Summary", icon: "file-text" },
      { id: "experience", name: "Work Experience", icon: "briefcase" },
      { id: "education", name: "Education History", icon: "graduation-cap" },
      { id: "projects", name: "Projects", icon: "folder" },
      { id: "skills", name: "Skills Expertise", icon: "sparkles" }
    ];

    let currentSectionIndex = 0;

    // 1. Get current signed-in user session context
    const userSession = JSON.parse(localStorage.getItem('currentUser'));

    // 2. Build a completely fresh, clean canvas template container for new users
    const createCleanSlateProfile = () => {
      return {
        // CHANGE: Use Date.now() or a random ID to ensure uniqueness in the dashboard
        _id: Date.now().toString(),

        // Keep your existing title logic
        title: userSession ? `${userSession.name}'s Resume` : 'My Resume',

        personal_info: {
          name: userSession ? (userSession.name || '') : '',
          full_name: userSession ? (userSession.name || '') : '',
          email: userSession ? (userSession.email || '') : '',
          phone: '',
          location: '',
          profession: '',
          linkedin: '',
          github: '',
          website: '',
          image: null
        },
        professional_summary: "",
        experience: [],
        education: [],
        project: [],
        skills: [],
        template: "classic",
        accent_color: "#3B82F6",
        public: false
      };
    };

    // Global visibility toggle mapping for background removal
    let removeBackground = false;

    // 3. SECURE BINDING: Check if this specific user has unique saved progress, or give them a brand new clean slate
    // --- REPLACE YOUR CURRENT "3. SECURE BINDING" BLOCK WITH THIS ---

    const urlParams = new URLSearchParams(window.location.search);
    const resumeId = urlParams.get('id');

    if (resumeId) {
      // We came from the Dashboard, so look in the master list
      const allResumes = JSON.parse(localStorage.getItem('myResumes')) || [];
      const foundResume = allResumes.find(r => r._id == resumeId);

      if (foundResume) {
        resumeData = foundResume;
      } else {
        // Fallback if ID is invalid
        resumeData = createCleanSlateProfile();
      }
    } else if (userSession) {
      // We are on the legacy/standalone user path
      const userSpecificStorageKey = `resumeData_${userSession.email}`;
      const savedUserProgress = localStorage.getItem(userSpecificStorageKey);
      resumeData = savedUserProgress ? JSON.parse(savedUserProgress) : createCleanSlateProfile();
    } else {
      // Guest path
      resumeData = createCleanSlateProfile();
    }


    // --- Modify Your Global Save Function to keep user accounts isolated ---
    // --- Unified Global Save Function to Keep Data Isolated & Persistent ---
    function saveToLocalStorage() {
      const urlParams = new URLSearchParams(window.location.search);
      const resumeId = urlParams.get('id');

      if (resumeId) {
        let allResumes = JSON.parse(localStorage.getItem('myResumes')) || [];
        // Correct-ana resume-ai kandupudichu, adhai mattum update pannum
        allResumes = allResumes.map(r => r._id == resumeId ? { ...r, ...window.resumeData } : r);
        localStorage.setItem('myResumes', JSON.stringify(allResumes));
        console.log("Resume updated in dashboard list!");
      } else {
        // Legacy/Guest save logic
        const userSpecificStorageKey = `resumeData_${userSession.email}`;
        localStorage.setItem(userSpecificStorageKey, JSON.stringify(window.resumeData));
      }
    }

    // --- DOM Elements Cache Selector Hub ---
    const formContainer = document.getElementById('builder-form');
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');
    const sectionTitle = document.getElementById('current-section-title');
    const progressBar = document.getElementById('progress-bar');
    const templateSelector = document.getElementById('template-selector');
    const colorPicker = document.getElementById('accent-color-picker');
    const saveBtn = document.getElementById('btn-save');
    const saveStatus = document.getElementById('save-status');
    const visibilityBtn = document.getElementById('btn-visibility');
    const shareBtn = document.getElementById('btn-share');
    const downloadBtn = document.getElementById('btn-download');
    const previewLayout = document.getElementById('resume-preview-layout');

    // --- Core Logic & Controller Engines ---
    // --- Core Logic & Controller Engines ---
    function initializeApp() {
      const userSession = JSON.parse(localStorage.getItem('currentUser'));
      if (!userSession) {
        window.location.href = 'signin.html';
        return;
      }

      templateSelector.value = resumeData.template || "classic";
      colorPicker.value = resumeData.accent_color || "#3B82F6";

      // --- NEW PERSISTENT ACTION LISTENERS ---
      // Captures and updates live configurations every single time a user types or tabs out
      formContainer.addEventListener('input', () => {
        captureCurrentFormInputs();
        renderPreview();
      });

      formContainer.addEventListener('change', () => {
        captureCurrentFormInputs();
        renderPreview();
      });

      // Attach Event Listeners
      templateSelector.addEventListener('change', (e) => { updateData('template', e.target.value); });
      colorPicker.addEventListener('input', (e) => { updateData('accent_color', e.target.value); });
      prevBtn.addEventListener('click', () => navigateSection(-1));
      nextBtn.addEventListener('click', () => navigateSection(1));
      saveBtn.addEventListener('click', (e) => {
        e.preventDefault();
        captureCurrentFormInputs();
        saveToLocalStorage();
      });

      visibilityBtn.addEventListener('click', toggleVisibility);
      downloadBtn.addEventListener('click', () => window.print());
      shareBtn.addEventListener('click', handleShareAction);

      renderCurrentSection();
      renderPreview();
    }
    function updateData(key, value) {
      resumeData[key] = value;
      renderPreview();
    }



    function navigateSection(direction) {
      captureCurrentFormInputs();
      currentSectionIndex += direction;

      // Boundaries Constraints
      if (currentSectionIndex < 0) currentSectionIndex = 0;
      if (currentSectionIndex >= SECTIONS.length) currentSectionIndex = SECTIONS.length - 1;

      renderCurrentSection();
    }

    function toggleVisibility() {
      resumeData.public = !resumeData.public;
      renderPreview();
    }

    function handleShareAction() {
      const shareUrl = window.location.href + "?view=" + resumeData._id;
      if (navigator.share) {
        navigator.share({ title: resumeData.title, url: shareUrl });
      } else {
        alert("Copied shareable link to clipboard: " + shareUrl);
      }
    }

    // --- Education Section State Handlers ---
    function addEducationItem() {
      captureCurrentFormInputs(); // Save existing text states before pushing empty entry
      if (!Array.isArray(resumeData.education)) resumeData.education = [];

      resumeData.education.push({
        institution: "",
        degree: "",
        field: "",
        graduation_date: "",
        gpa: ""
      });

      renderCurrentSection();
      renderPreview();
    }

    function removeEducationItem(index) {
      captureCurrentFormInputs();
      resumeData.education = resumeData.education.filter((_, i) => i !== index);
      renderCurrentSection();
      renderPreview();
    }

    // --- Experience Array Section State Management Helpers ---
    function addExperienceItem() {
      captureCurrentFormInputs();
      if (!Array.isArray(resumeData.experience)) resumeData.experience = [];

      resumeData.experience.push({
        company: "",
        position: "",
        start_date: "",
        end_date: "",
        description: "",
        is_current: false
      });

      renderCurrentSection();
      renderPreview();
    }

    function removeExperienceItem(index) {
      captureCurrentFormInputs();
      resumeData.experience = resumeData.experience.filter((_, i) => i !== index);
      renderCurrentSection();
      renderPreview();
    }



    function toggleCurrentJob(checkbox, index) {
      captureCurrentFormInputs();
      resumeData.experience[index].is_current = checkbox.checked;
      if (checkbox.checked) {
        resumeData.experience[index].end_date = ""; // Wipe value if currently working there
      }
      renderCurrentSection();
      renderPreview();
    }


    // --- Projects Section State Management Helpers ---
    function addProjectItem() {
      captureCurrentFormInputs();
      if (!Array.isArray(resumeData.project)) resumeData.project = [];

      resumeData.project.push({
        name: "",
        type: "",
        description: ""
      });

      renderCurrentSection();
      renderPreview();
    }

    function removeProjectItem(index) {
      captureCurrentFormInputs();
      resumeData.project = resumeData.project.filter((_, i) => i !== index);
      renderCurrentSection();
      renderPreview();
    }


    // --- Skills Badge Core Section Handlers ---
    function addSkillBadge() {
      const input = document.getElementById('skill-input-field');
      if (!input) return;

      const value = input.value.trim();
      if (!Array.isArray(resumeData.skills)) resumeData.skills = [];

      // Prevent blank insertions and block duplicate entries
      if (value && !resumeData.skills.includes(value)) {
        resumeData.skills.push(value);

        // Clear field input focus value target cleanly
        input.value = '';

        renderCurrentSection();
        renderPreview();

        // Auto re-focus input block element context layout for fluid serial additions
        document.getElementById('skill-input-field').focus();
      }
    }

    function removeSkillBadge(indexToRemove) {
      resumeData.skills = resumeData.skills.filter((_, index) => index !== indexToRemove);
      renderCurrentSection();
      renderPreview();
    }

    function handleSkillKeyPress(e) {
      if (e.key === 'Enter') {
        e.preventDefault(); // Break native postback rules inside tracking forms
        addSkillBadge();
      }
    }

    function loadResume(resume) {

      // Personal Info
      document.getElementById("name").value = resume.personal_info?.name || "";
      document.getElementById("full_name").value = resume.personal_info?.full_name || "";
      document.getElementById("email").value = resume.personal_info?.email || "";
      document.getElementById("phone").value = resume.personal_info?.phone || "";
      document.getElementById("location").value = resume.personal_info?.location || "";
      document.getElementById("profession").value = resume.personal_info?.profession || "";
      document.getElementById("linkedin").value = resume.personal_info?.linkedin || "";
      document.getElementById("github").value = resume.personal_info?.github || "";
      document.getElementById("website").value = resume.personal_info?.website || "";

      // Professional Summary
      document.getElementById("professional_summary").value =
        resume.professional_summary || "";

      // Experience
      const experienceContainer = document.getElementById("experienceContainer");
      experienceContainer.innerHTML = "";

      (resume.experience || []).forEach(exp => {

        addExperience();

        const card = experienceContainer.lastElementChild;

        card.querySelector(".company").value = exp.company || "";
        card.querySelector(".position").value = exp.position || "";
        card.querySelector(".duration").value = exp.duration || "";
        card.querySelector(".description").value = exp.description || "";

      });

      // Education
      const educationContainer = document.getElementById("educationContainer");
      educationContainer.innerHTML = "";

      (resume.education || []).forEach(edu => {

        addEducation();

        const card = educationContainer.lastElementChild;

        card.querySelector(".degree").value = edu.degree || "";
        card.querySelector(".college").value = edu.college || "";
        card.querySelector(".year").value = edu.year || "";
        card.querySelector(".cgpa").value = edu.cgpa || "";

      });

      // Projects
      const projectContainer = document.getElementById("projectContainer");
      projectContainer.innerHTML = "";

      (resume.project || []).forEach(project => {

        addProject();

        const card = projectContainer.lastElementChild;

        card.querySelector('[data-proj-field="name"]').value =
          project.name || "";

        card.querySelector('[data-proj-field="type"]').value =
          project.type || "";

        card.querySelector('[data-proj-field="description"]').value =
          project.description || "";

      });

      // Skills
      const skillContainer = document.getElementById("skillContainer");
      skillContainer.innerHTML = "";

      (resume.skills || []).forEach(skill => {

        addSkill();

        const card = skillContainer.lastElementChild;

        card.querySelector(".skill").value = skill.skill || "";


      });

    }

    document.addEventListener('DOMContentLoaded', () => {

      const urlParams = new URLSearchParams(window.location.search);
      const resumeId = urlParams.get('id');

      const allResumes = JSON.parse(localStorage.getItem('myResumes')) || [];

      let foundResume = null;

      if (resumeId) {
        foundResume = allResumes.find(r => r._id == resumeId);
      }

      if (foundResume) {

        window.resumeData = foundResume;

        // Load all fields
        loadResume(foundResume);

      } else {

        window.resumeData = createCleanSlateProfile();

      }

      if (typeof initializeWorkspaceEditor === "function") {
        initializeWorkspaceEditor(window.resumeData);
      }

    });

    function loadResume(resume) {

      // Personal Information
      Object.assign(window.resumeData.personal_info, resume.personal_info || {});

      // Summary
      window.resumeData.professional_summary =
        resume.professional_summary || "";

      // Experience
      window.resumeData.experience =
        resume.experience || [];

      // Education
      window.resumeData.education =
        resume.education || [];

      // Projects
      window.resumeData.project =
        resume.project || [];

      // Skills
      window.resumeData.skills =
        resume.skills || [];

      // Template
      window.resumeData.template =
        resume.template || "classic";

      // Accent Color
      window.resumeData.accent_color =
        resume.accent_color || "#3B82F6";

      // Public
      window.resumeData.public =
        resume.public || false;

    }



    // --- Dynamic Form Renderer Factory ---
    function renderCurrentSection() {


      const section = SECTIONS[currentSectionIndex];

      // Update UI Header and Nav steps visibility rules
      sectionTitle.innerHTML = `<i data-lucide="${section.icon}" class="w-5 h-5"></i> ${section.name}`;
      progressBar.style.width = `${(currentSectionIndex * 100) / (SECTIONS.length - 1)}%`;

      prevBtn.classList.toggle('hidden', currentSectionIndex === 0);
      nextBtn.classList.toggle('hidden', currentSectionIndex === SECTIONS.length - 1);

      formContainer.innerHTML = '';

      // Render structural logic maps depending on what section context index is operational
      if (section.id === 'personal') {
        // Ensure personal_info nested structure exists safely to prevent runtime crashes
        const pi = resumeData.personal_info || {};

        formContainer.innerHTML = `
    <div class="space-y-4">
      <!-- Name and Professional Title -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Full Name</label>
          <input type="text" data-field="personal_info.name" value="${userSession.name || pi.full_name || ''}" class="w-full p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm" placeholder="John Doe">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Professional Title</label>
          <input type="text" data-field="personal_info.profession" value="${pi.profession || ''}" class="w-full p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm" placeholder="e.g. Senior Software Engineer">
        </div>
      </div>

      <!-- Contact Info -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Email Address</label>
          <input type="email" data-field="personal_info.email" value="${userSession.email || ''}" class="w-full p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm" placeholder="name@example.com">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Phone Number</label>
          <input type="text" data-field="personal_info.phone" value="${userSession.phone || ''}" class="w-full p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm" placeholder="(123) 456-7890">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Location </label>
          <input type="text" data-field="personal_info.location" value="${pi.location || ''}" class="w-full p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm" placeholder="New York, NY">
        </div>
      </div>

      <!-- Web Links (Three-column layout for modern web presence) -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">LinkedIn Profile</label>
          <input type="url" data-field="personal_info.linkedin" value="${pi.linkedin || ''}" class="w-full p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm" placeholder="https://linkedin.com/in/... ">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">GitHub / Portfolio</label>
          <input type="url" data-field="personal_info.github" value="${pi.github || pi.portfolio || ''}" class="w-full p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm" placeholder="https://github.com/... ">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Personal Website</label>
          <input type="url" data-field="personal_info.website" value="${pi.website || ''}" class="w-full p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none text-sm" placeholder="https://... ">
        </div>
      </div>
    </div>
  `;
      }
      else if (section.id === 'summary') {
        formContainer.innerHTML = `
          <div><label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Executive Summary</label><textarea data-field="professional_summary" rows="6" class="w-full p-2 border border-gray-300 rounded focus:ring-1 focus:ring-blue-500 outline-none">${resumeData.professional_summary || ''}</textarea></div>
        `;
      }
      else if (section.id === 'experience') {
        if (!Array.isArray(resumeData.experience)) {
          resumeData.experience = [];
        }

        let html = `
    <div class="space-y-4">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-xs text-gray-500">Highlight your career timeline and roles.</p>

    // Silently updates your local storage context without disrupting layout rendering
    function saveToLocalStorageSilent() {
      if (userSession) {
        const userSpecificStorageKey = `resumeData_${userSession.email}`;
        localStorage.setItem(userSpecificStorageKey, JSON.stringify(resumeData));
        localStorage.setItem('resumeData', JSON.stringify(resumeData));
      } else {
        localStorage.setItem('resumeData', JSON.stringify(resumeData));
      }
    }
    function captureCurrentFormInputs() {
      // 1. Core global fields mapping parser
      const inputs = formContainer.querySelectorAll('[data-field]');
      inputs.forEach(input => {
        const fieldPath = input.getAttribute('data-field');
        const value = input.value;

        if (fieldPath.includes('.')) {
          const parts = fieldPath.split('.');
          if (parts.length === 2) {
            if (!resumeData[parts[0]]) resumeData[parts[0]] = {};
            resumeData[parts[0]][parts[1]] = value;
          } else if (parts.length === 3) {
            const idx = parseInt(parts[1]);
            if (!resumeData[parts[0]]) resumeData[parts[0]] = [];
            if (!resumeData[parts[0]][idx]) resumeData[parts[0]][idx] = {};
            resumeData[parts[0]][idx][parts[2]] = value;
          }
        } else {
          resumeData[fieldPath] = value;
        }
      });

      // 2. Loop & process iterative structural Education inputs
      const eduInputs = formContainer.querySelectorAll('[data-edu-index]');
      eduInputs.forEach(input => {
        const idx = parseInt(input.getAttribute('data-edu-index'));
        const field = input.getAttribute('data-edu-field');
        if (!resumeData.education) resumeData.education = [];
        if (!resumeData.education[idx]) resumeData.education[idx] = {};
        resumeData.education[idx][field] = input.value;
      });

      // Loop & process iterative structural Experience inputs
      const expInputs = formContainer.querySelectorAll('[data-exp-index]');
      expInputs.forEach(input => {
        const idx = parseInt(input.getAttribute('data-exp-index'));
        const field = input.getAttribute('data-exp-field');
        if (!resumeData.experience) resumeData.experience = [];
        if (!resumeData.experience[idx]) resumeData.experience[idx] = {};

        if (input.type === 'checkbox') {
          resumeData.experience[idx][field] = input.checked;
        } else {
          resumeData.experience[idx][field] = input.value;
        }
      });

      // Loop & process iterative structural Project inputs
      const projInputs = formContainer.querySelectorAll('[data-proj-index]');
      projInputs.forEach(input => {
        const idx = parseInt(input.getAttribute('data-proj-index'));
        const field = input.getAttribute('data-proj-field');
        if (!resumeData.project) resumeData.project = [];
        if (!resumeData.project[idx]) resumeData.project[idx] = {};

        resumeData.project[idx][field] = input.value;

        // Backwards compatibility mappings
        if (field === 'name') resumeData.project[idx].title = input.value;
        if (field === 'type') resumeData.project[idx].technologies = input.value;
      });

      // 3. Skills raw inputs configuration tracking map (SAFE CHECK)
      if (!resumeData.skills) resumeData.skills = [];
      const skillsInput = document.getElementById('skills-raw-input');

      // CRITICAL FIX: Only parse raw string data if the raw input element is actively present on the DOM 
      // AND has a value, otherwise it will overwrite your badge arrays!
      if (skillsInput && skillsInput.value.trim() !== "") {
        resumeData.skills = skillsInput.value.split(',').map(s => s.trim()).filter(s => s.length > 0);

      // 4. PERSISTENCE LAYER: Force execution of save behind the scenes instantly
      saveToLocalStorageSilent();

      renderPreview();
    }
